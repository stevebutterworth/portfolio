profile: >
  Full-stack Ruby on Rails engineer with 20+ years of whole-product ownership,
  building, shipping and running software end to end, from customer conversation to
  production and long-term operation. That work spans everything from live systems
  serving over a million visits a day to a business-critical platform in production
  for 13 years and counting. Contracting since 2013 on long retained engagements,
  always joining to stay rather than pass through. Retained work rarely fills a
  full week, so shorter product builds run alongside, several reporting
  dashboards, warehouse management software and a live footfall dashboard
  among them.

  Deep Rails, with LLM pipeline work spanning classification, summarisation
  and a tool-calling chatbot. Comfortable owning
  everything from architecture to customer support. Quick to prototype and
  test ideas, and careful to keep production systems simple enough to stay
  reliable and easy to maintain.

  Agentic engineering has become central to how I work. I drive coding agents
  under strict SDLC guardrails, applying judgement built over two decades of
  shipping code to production, and deliver cleaner, more reliable software far
  faster than I could a year ago.

